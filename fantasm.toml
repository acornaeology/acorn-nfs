# fantasm project configuration. See docs/configuration.md for the schema.

[project]
name = "acorn-nfs"

[rom]
# Default CPU is NMOS 6502; ANFS 4.21+ overrides to 65c02 in its
# driver script. fantasm's audit/cfg/etc. read this default.
cpu = "6502"
base_address = 0x8000

[versions]
# anfs/ ROMs and nfs/ ROMs share this repo: anfs is the BBC Master
# 128 / Compact variant, nfs is the original BBC B / B+ release.
prefixes = ["anfs", "nfs"]

# Workspace addresses NFS / ANFS use are declared via the per-version
# driver's external_label() calls; fantasm 0.4.0's lint reads them
# from the JSON. Per-version reloc_blocks below give the version
# graph its dest pages for `addresses map` / `backfill` / `compose`
# operations.

# === NFS chain (linear: 3.34 root, each successor a child of the prior) =====

[[versions.entry]]
id = "3.34"
reloc_blocks = [
    { source = 0x9307, dest = 0x0016, length = 0x61 },
    { source = 0x934C, dest = 0x0400, length = 0x100 },
    { source = 0x944C, dest = 0x0500, length = 0x100 },
    { source = 0x954C, dest = 0x0600, length = 0x100 },
]

