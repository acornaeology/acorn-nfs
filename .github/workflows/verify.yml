name: Verify disassembly

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Check README.md is up to date
        run: uv run generate_readme.py --check

  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ["3.34", "3.34B", "3.35D", "3.35K", "3.40", "3.60", "3.62", "3.65", "4.08.53", "4.18"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Build beebasm
        uses: actions/cache@v4
        id: beebasm-cache
        with:
          path: /usr/local/bin/beebasm
          key: beebasm-v1.11-rebuild

      - name: Build beebasm from source
        if: steps.beebasm-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.11 https://github.com/stardot/beebasm.git /tmp/beebasm
          cmake -S /tmp/beebasm -B /tmp/beebasm/build
          make -C /tmp/beebasm/build -j$(nproc)
          sudo cp /tmp/beebasm/build/beebasm /usr/local/bin/

      # Resolve which prefix and which driver-script identifier the
      # version uses. anfs- versions start with 4.x, the rest are nfs-.
      # The driver-script filename takes the version_id with all dots
      # removed (3.34 -> 334, 4.08.53 -> 40853).
      - name: Compute driver path
        id: driver
        run: |
          ver="${{ matrix.version }}"
          case "$ver" in
            4.*) prefix=anfs ;;
            *)   prefix=nfs ;;
          esac
          ver_no_dots="${ver//./}"
          echo "path=versions/${prefix}-${ver}/disassemble/disasm_${prefix}_${ver_no_dots}.py" >> "$GITHUB_OUTPUT"

      # py8dis is invoked directly via the per-version driver script.
      # fantasm operates on the .json/.asm artefacts py8dis emits.
      # `fantasm disassemble VID` is filed as fantasm#2 — once it
      # lands the driver-script invocation collapses to a fantasm call.
      - name: Disassemble Acorn NFS ${{ matrix.version }}
        run: uv run python ${{ steps.driver.outputs.path }}

      - name: Lint Acorn NFS ${{ matrix.version }}
        run: uv run fantasm lint ${{ matrix.version }} ${{ steps.driver.outputs.path }}

      - name: Verify Acorn NFS ${{ matrix.version }}
        run: uv run fantasm verify ${{ matrix.version }}
