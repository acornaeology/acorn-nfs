name: Verify disassembly

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ["3.34", "3.34B", "3.35D", "3.35K", "3.40", "3.60", "3.62", "3.65", "4.08.53"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Build beebasm
        uses: actions/cache@v4
        id: beebasm-cache
        with:
          path: /usr/local/bin/beebasm
          key: beebasm-v1.09

      - name: Build beebasm from source
        if: steps.beebasm-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.09 https://github.com/stardot/beebasm.git /tmp/beebasm
          make -C /tmp/beebasm/src -j$(nproc)
          sudo cp /tmp/beebasm/src/beebasm /usr/local/bin/

      - name: Disassemble Acorn NFS ${{ matrix.version }}
        run: uv run acorn-nfs-disasm-tool disassemble ${{ matrix.version }}

      - name: Lint Acorn NFS ${{ matrix.version }}
        run: uv run acorn-nfs-disasm-tool lint ${{ matrix.version }}

      - name: Verify Acorn NFS ${{ matrix.version }}
        run: uv run acorn-nfs-disasm-tool verify ${{ matrix.version }}
